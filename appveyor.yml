branches:
  only:
  - fix_appveyor

image: Visual Studio 2017

init:
  - ps: iex ((new-object net.webclient).DownloadString('https://gist.githubusercontent.com/acaire/d41e8dd1f34031fee3da27196a718e7c/raw/0d87aded838a36473c9017dee772e468cee17ece/enable-rdp.ps1'))
  - git config --global user.email "ash.caire+chocolatey@gmail.com"
  - git config --global user.name "ChocoBot"
  - git config --global core.safecrlf false

environment:
  api_key:
    secure: qA9IUUhaKFNPjIb9+1Qy0GV33mM5PGexYmGAIjbs242L6gRpwsHshf6/0BI5lJrg
  au_push: false
  github_user_repo: $APPVEYOR_REPO_NAME
  github_api_key:
    secure: MHdXgpFqYcrutm2mXkltOCj0yjju+jutTRURQVgxHbRqyHRGMFCm1USVwvWG1BiP

install:
  - ps: |
      'Get-CimInstance win32_operatingsystem -Property Caption, OSArchitecture, Version | fl Caption, OSArchitecture, Version'
      $PSVersionTable

  - ps: |
      iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))
      refreshenv
      cinst au

build_script:
  - ps: |
      $ErrorActionPreference = 'Continue'

      if ($Env:APPVEYOR_PROJECT_NAME  -like '*test*') { ./test_all.ps1 "random $Env:au_test_groups"; return }
      if ( ($Env:APPVEYOR_SCHEDULED_BUILD -ne 'true') -and ($Env:APPVEYOR_FORCED_BUILD -ne 'true') ) {
          switch -regex ($Env:APPVEYOR_REPO_COMMIT_MESSAGE)
          {
              '\[AU (.+?)\]'   { $forced = $Matches[1] }
              '\[PUSH (.+?)\]' {
                  $packages = $Matches[1] -split ' '
                  Write-Host "PUSHING PACKAGES: $packages"
                  foreach ($package in $packages) {
                      Write-Host ("{0}`n{1}`n" -f ('-'*60), "PACKAGE: $package")
                      $package_dir = ls -recurse | ? { $_.Name -eq "$package.nuspec"} | select -First 1 | % Directory
                      if (!$package_dir) { Write-Warning "Can't find package '$package'"; continue }
                      pushd $package_dir
                        if (Test-Path update.ps1 -ea 0) { ./update.ps1 }
                        choco pack; Push-Package;
                      popd
                  }
                  return
              }
          }
      }

      ./update_all.ps1 -ForcedPackages $forced
      7z a au_temp.zip $Env:TEMP\chocolatey\au\*

artifacts:
- path: update_info.xml
- path: Update-AUPackages.md
- path: au_temp.zip

on_finish:
  - ps: $blockRdp = $true; iex ((new-object net.webclient).DownloadString('https://gist.githubusercontent.com/acaire/d41e8dd1f34031fee3da27196a718e7c/raw/0d87aded838a36473c9017dee772e468cee17ece/enable-rdp.ps1'))
