language: csharp
mono:
  - 3.12.0
install:
  - sudo apt-get install mono-devel mono-gmcs
  - curl -LO https://raw.githubusercontent.com/chocolatey/choco/master/src/chocolatey.sln
  - nuget restore chocolatey.sln
  = rm chocolatey.bin
before_script:
  - curl -LO https://raw.githubusercontent.com/chocolatey/choco/master/build.sh
  - chmod +x build.sh
script:
  - ./build.sh -v
